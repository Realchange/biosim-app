<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BIOSIM — H6: An AI that corrects its own thinking</title>
  <link rel="stylesheet" href="assets/style.css?v=74811693c0" />
</head>
<body>
  <div class="lang-switch" role="group" aria-label="Language">
    <button id="lang-en" class="active" type="button">EN</button>
    <button id="lang-de" type="button">DE</button>
  </div>

  <nav class="site-nav" aria-label="Sections">
    <div class="wrap">
      <span class="site-nav-brand">BIOSIM</span>
      <a href="#overview" data-i18n="nav_overview">Overview</a>
      <a href="#loop" data-i18n="nav_loop">The loop</a>
      <a href="#timeline" data-i18n="nav_case">Case study</a>
      <a href="#pipeline" data-i18n="nav_pipeline">Pipeline</a>
    </div>
  </nav>

  <header class="site-header">
    <div class="wrap">
      <p class="eyebrow" data-i18n="eyebrow"></p>
      <h1 data-i18n="h1"></h1>
      <p class="lede" data-i18n="lede"></p>
      <p class="meta" id="build-meta"></p>
    </div>
  </header>

  <main class="wrap">
    <section id="overview" class="primer" aria-label="Overview">
      <div class="primer-card" id="primer-card"></div>
    </section>

    <section id="trace-intro" class="trace-intro-section" aria-label="Reference rhythm">
      <div id="trace-reference"></div>
    </section>

    <section id="loop" class="loop" aria-label="The loop">
      <h2 id="loop-title"></h2>
      <p id="loop-intro" class="loop-intro"></p>
      <div class="loop-layout">
        <div id="loop-diagram" class="loop-diagram"></div>
        <div id="loop-detail" class="loop-detail"></div>
      </div>
      <p id="loop-footnote" class="loop-footnote"></p>
    </section>

    <div class="hyp-switch" role="group" aria-label="Case study">
      <button id="hyp-h6" type="button" data-i18n="hyp_h6_label"></button>
      <button id="hyp-h5" type="button" data-i18n="hyp_h5_label"></button>
    </div>
    <h2 id="timeline-title" class="timeline-title"></h2>

    <section id="timeline" class="timeline" aria-label="Case study timeline"></section>

    <section id="trace-contrast" class="trace-contrast-section" aria-label="Intact vs collapsed rhythm">
      <h2 id="trace-contrast-h2"></h2>
      <p id="trace-contrast-note" class="trace-contrast-note"></p>
      <div class="trace-pair">
        <div id="trace-ref-pair"></div>
        <div id="trace-col-pair"></div>
      </div>
    </section>

    <section id="contrast" class="contrast" aria-label="The core contrast">
      <h2 data-i18n="contrast_h2"></h2>
      <p class="contrast-intro" data-i18n="contrast_intro1"></p>
      <p class="contrast-intro" data-i18n="contrast_intro2"></p>
      <p id="contrast-caption" class="caption"></p>
      <div class="toggle" role="group" aria-label="Switch view">
        <button id="btn-slope" class="active" type="button" data-i18n="btn_slope"></button>
        <button id="btn-collapse" type="button" data-i18n="btn_collapse"></button>
      </div>
      <table id="contrast-table" class="data-table">
        <thead>
          <tr>
            <th><span data-i18n="col_control"></span><span class="th-sub">Leitfähigkeit</span></th>
            <th><span data-i18n="col_effect"></span><span class="th-sub">slopeNearZero</span></th>
            <th id="th-dynamic"><span data-i18n="col_collapse"></span><span class="th-sub">collapsedFraction</span></th>
            <th data-i18n="col_reading"></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="contrast-glossary"></div>
      <p id="contrast-provenance" class="provenance"></p>
    </section>

    <section id="pipeline" class="pipeline" aria-label="Pipeline">
      <h2 id="pipeline-title"></h2>
      <p id="pipeline-intro" class="pipeline-intro"></p>
      <div id="pipeline-table" class="pipeline-table-wrap"></div>
      <div id="pipeline-callouts" class="pl-callouts"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p class="footer-plain" data-i18n="footer_plain"></p>
      <p class="footer-tech" data-i18n="footer_tech"></p>
    </div>
  </footer>

  <script src="assets/app.js?v=3e729061bd"></script>
</body>
</html>
